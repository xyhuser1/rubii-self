<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Rubii Self</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:#0f0f12;color:#e8e8f0;height:100dvh;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column}
.hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#1a1a22;border-bottom:1px solid #333;flex-shrink:0}
.hdr h1{font-size:17px;flex:1}
.hdr .s{font-size:11px;color:#999}
.btn{background:#2a2a36;border:none;color:#e8e8f0;padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;white-space:nowrap}
.btn:active{background:#3a3a46}
.btn-p{background:#7c6fef;color:#fff;width:100%;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.btn-p:active{opacity:.8}
.btn-d{width:100%;padding:12px;border:1px solid rgba(239,68,68,.3);border-radius:10px;color:#ef4444;background:transparent;font-size:15px;cursor:pointer}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
.emp{text-align:center;padding:40px 20px;color:#999}
.emp .i{font-size:40px;margin-bottom:10px}
.emp h3{font-size:17px;color:#e8e8f0;margin-bottom:6px}
.emp p{font-size:14px;line-height:1.6}
.grid{display:flex;flex-direction:column;gap:10px;padding-bottom:10px}
.card{display:flex;align-items:center;gap:12px;padding:12px;background:#1a1a22;border:1px solid #333;border-radius:12px;cursor:pointer}
.card:active{background:#24242e}
.card .av{width:48px;height:48px;border-radius:50%;background:rgba(124,111,239,.12);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.card .nm{font-size:15px;font-weight:600;margin-bottom:2px}
.card .ds{font-size:12px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .ac{display:flex;gap:4px}
.card .ac .btn{padding:6px 10px;font-size:12px}
.msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px;-webkit-overflow-scrolling:touch}
.msg{max-width:88%;padding:8px 12px;border-radius:14px;font-size:15px;line-height:1.5;word-break:break-word}
.msg.u{align-self:flex-end;background:#7c6fef;color:#fff;border-bottom-right-radius:4px}
.msg.a{align-self:flex-start;background:#1a1a22;border:1px solid #333;border-bottom-left-radius:4px}
.msg .sn{font-size:11px;color:#999;margin-bottom:3px}
.msg .tm{font-size:10px;color:#999;margin-top:3px;opacity:.7}
.msg.u .tm{color:rgba(255,255,255,.6)}
.typing{align-self:flex-start;display:flex;gap:3px;padding:12px 16px;background:#1a1a22;border:1px solid #333;border-radius:14px;border-bottom-left-radius:4px}
.typing span{width:7px;height:7px;border-radius:50%;background:#999;animation:ty 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes ty{0%,60%,100%{opacity:.3;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}
.inp{display:flex;align-items:flex-end;gap:8px;padding:8px 12px;background:#1a1a22;border-top:1px solid #333;flex-shrink:0}
.inp textarea{flex:1;resize:none;padding:8px 12px;border-radius:18px;background:#2a2a36;color:#e8e8f0;border:1px solid #333;max-height:80px;line-height:1.4;font-size:14px;font-family:inherit}
.inp textarea:focus{border-color:#7c6fef;outline:none}
.inp .sd{width:38px;height:38px;border-radius:50%;background:#7c6fef;color:#fff;border:none;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.inp .sd:disabled{opacity:.4}
.ar{display:flex;gap:6px;padding:3px 12px 6px;background:#1a1a22;border-top:1px solid #333;flex-shrink:0;flex-wrap:wrap}
.ar .btn{font-size:11px;padding:5px 10px;border-radius:14px;background:#2a2a36;color:#999;border:1px solid #333}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;color:#999;margin-bottom:4px;font-weight:600}
.fg input,.fg textarea,.fg select{width:100%;padding:9px 11px;border-radius:8px;background:#1a1a22;color:#e8e8f0;border:1px solid #333;font-size:14px;font-family:inherit}
.fg textarea{min-height:70px;line-height:1.5}
.fg input:focus,.fg textarea:focus{border-color:#7c6fef;outline:none}
.ap{display:flex;gap:6px;flex-wrap:wrap}
.ap div{width:40px;height:40px;border-radius:50%;background:#1a1a22;border:2px solid #333;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.ap div.s{border-color:#7c6fef;background:rgba(124,111,239,.12)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:10px;background:#1a1a22;color:#e8e8f0;border:1px solid #333;font-size:13px;z-index:99;max-width:90%;text-align:center;animation:ti .25s ease}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:50}
.dx{background:#1a1a22;border-radius:12px;padding:20px;width:300px;max-width:85%;border:1px solid #333}
.dx h3{font-size:15px;margin-bottom:6px}
.dx p{font-size:13px;color:#999;margin-bottom:16px}
.da{display:flex;gap:8px;justify-content:flex-end}
.da .btn{padding:7px 18px;border-radius:8px}
.da .cl{background:#2a2a36;color:#e8e8f0}
.da .cf{background:#ef4444;color:#fff}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── 状态 ──
let apiKey = '';
let chars = [];
let curId = null;
let msgs = [];
let sending = false;
const AV = ['🤖','😺','🦊','🐰','🐻','🐲','🦋','🌸','👾','🎭','🧙','🧝','🦸','🧛','👻','🤠','💃','🎸','🕵️','🧚','🧜','🦄','🐉','🦅','🐺','🦁','🐯','🌙','☀️','⭐','🌺','🌻','🔥','⚡','💎','🔮','⚔️','🏹','👑','🎩','🥷','🎴','♟️','🗻','🏯','⛩️','🌊','💫'];

function $(id){return document.getElementById(id)}
function q(s){return document.querySelector(s)}
function qa(s){return document.querySelectorAll(s)}

function toast(m){let e=document.querySelector('.toast');if(e)e.remove();e=document.createElement('div');e.className='toast';e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),3000)}

function esc(s){let d=document.createElement('div');d.textContent=s;return d.innerHTML}
function ft(ts){let d=new Date(ts);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}

function pg(id){qa('.pg').forEach(p=>p.classList.remove('a'));$(id).classList.add('a')}

async function api(m,u,b){let o={method:m,headers:{'Content-Type':'application/json'}};if(b)o.body=JSON.stringify(b);let r=await fetch(u,o);let d=await r.json();if(!r.ok)throw new Error(d.error||'请求失败');return d}

// ── 页面 ──
let R = $('#app');

function home(){
  R.innerHTML='<div class="hdr"><h1>Rubii Self <span class="s">私人 AI 角色聊天</span></h1><button class="btn" onclick="set()">⚙</button></div><div class="main" id="hm"></div>';
  loadHome();
}
async function loadHome(){
  try{
    let list=await api('GET','/api/characters');
    chars=list;
    let c=$('hm');
    if(list.length===0){
      c.innerHTML='<div class="emp"><div class="i">🤖</div><h3>还没有角色</h3><p>创建你的第一个 AI 角色</p></div><div style="padding:8px 16px 24px"><button class="btn-p" onclick="edit()">＋ 创建角色</button></div>';
      return;
    }
    let h='<div class="grid">';
    list.forEach(ch=>{h+='<div class="card" data-id="'+ch.id+'"><div class="av">'+ch.avatar+'</div><div class="info"><div class="nm">'+esc(ch.name)+'</div><div class="ds">'+esc(ch.description||'')+'</div></div><div class="ac"><button class="btn" onclick="event.stopPropagation();edit(''+ch.id+'')">✎</button><button class="btn" onclick="event.stopPropagation();del(''+ch.id+'')">✕</button></div></div>'});
    h+='</div><div style="padding:8px 16px 24px;display:flex;flex-direction:column;gap:8px"><button class="btn-p" onclick="edit()">＋ 创建角色</button></div>';
    c.innerHTML=h;
  }catch(e){$('hm').innerHTML='<div class="emp"><p>加载失败: '+e.message+'</p></div>'}
  // 点击卡片进入聊天
  qa('.card').forEach(el=>el.addEventListener('click',function(e){if(e.target.closest('.ac'))return;openChat(this.dataset.id)}));
}

function openChat(id){
  curId=id;
  let ch=chars.find(c=>c.id===id);
  R.innerHTML='<div class="hdr"><button class="btn" onclick="back()">‹</button><h1 id="cn">'+(ch?esc(ch.name):'聊天')+'</h1><button class="btn" onclick="edit(''+id+'')">✎</button></div><div class="msgs" id="msgs"><div class="emp" id="emp"><div class="i">💬</div><h3>开始聊天</h3><p id="gr">'+(ch?esc(ch.greeting||'你好，我是'+ch.name+'。'):'')+'</p></div></div><div class="ar"><button class="btn" onclick="clearChat()">🗑 清空</button><button class="btn" onclick="exp()">📥 导出</button></div><div class="inp"><textarea id="inp" rows="1" placeholder="输入消息..." maxlength="5000"></textarea><button class="sd" id="sd" onclick="send()">↑</button></div>';
  loadChat(id);
}
async function loadChat(id){
  try{
    msgs=await api('GET','/api/characters/'+id+'/chat');
    renderMsgs();
    $('inp').focus();
  }catch(e){toast('加载聊天记录失败')}
}
function renderMsgs(){
  let c=$('msgs'),e=$('emp');
  if(!c)return;
  if(msgs.length===0){if(e){c.innerHTML='';c.appendChild(e);e.style.display='block'}return}
  if(e)e.style.display='none';
  let h='';
  msgs.forEach(m=>{
    if(m.role==='u'||m.role==='user')h+='<div class="msg u"><div>'+esc(m.content)+'</div><div class="tm">'+ft(m.timestamp)+'</div></div>';
    else h+='<div class="msg a"><div class="sn">'+(chars.find(c=>c.id===curId)?.name||'AI')+'</div><div>'+esc(m.content).replace(/
/g,'<br>')+'</div><div class="tm">'+ft(m.timestamp)+'</div></div>';
  });
  c.innerHTML=h;
  c.scrollTop=c.scrollHeight;
}

async function send(){
  let inp=$('inp');
  if(!inp)return;
  let msg=inp.value.trim();
  if(!msg||sending||!curId)return;
  inp.value='';inp.style.height='auto';
  sending=true;$('sd').disabled=true;
  msgs.push({role:'user',content:msg,timestamp:Date.now()});
  renderMsgs();
  // 打字指示器
  let mc=$('msgs');
  if(mc){let te=document.createElement('div');te.className='typing';te.id='ty';te.innerHTML='<span></span><span></span><span></span>';mc.appendChild(te);mc.scrollTop=mc.scrollHeight}
  try{
    if(!apiKey){toast('⚠️ 请先在设置中填写 API Key');throw new Error('未设置 API Key')}
    let r=await api('POST','/api/characters/'+curId+'/chat',{message:msg,config:{apiKey,baseUrl:'https://api.deepseek.com',model:'deepseek-chat',temperature:.8,maxHistory:30}});
    let te=$('ty');if(te)te.remove();
    msgs.push({role:'assistant',content:r.reply,timestamp:Date.now()});
    renderMsgs();
  }catch(e){
    let te=$('ty');if(te)te.remove();
    msgs.push({role:'assistant',content:'⚠️ '+e.message,timestamp:Date.now()});
    renderMsgs();
    inp.value=msg;
  }finally{sending=false;$('sd').disabled=false;try{inp.focus()}catch(e){}}
}

function back(){curId=null;msgs=[];home()}
function clearChat(){
  if(!curId)return;
  if(!confirm('清空所有对话记录？'))return;
  api('POST','/api/characters/'+curId+'/chat/clear').then(()=>{msgs=[];renderMsgs();toast('已清空')}).catch(e=>toast('清空失败'));
}
function exp(){if(curId)window.open('/api/characters/'+curId+'/chat/export','_blank')}

// ── 编辑角色 ──
function edit(id){
  let ch=id?chars.find(c=>c.id===id):null;
  R.innerHTML='<div class="hdr"><button class="btn" onclick="'+(id&&curId===id?'pg('chat')':'home()')+'">‹</button><h1>'+(id?'编辑角色':'创建角色')+'</h1><button class="btn" style="visibility:hidden"> </button></div><div class="main"><form id="ef">'+
    '<div class="fg"><label>头像</label><div class="ap" id="ap">'+AV.map(a=>'<div class="'+(ch&&ch.avatar===a?'s':'')+'" data-a="'+a+'" onclick="this.parentNode.querySelectorAll('div').forEach(e=>e.classList.remove('s'));this.classList.add('s')">'+a+'</div>').join('')+'</div></div>'+
    '<div class="fg"><label>角色名 *</label><input id="en" value="'+(ch?esc(ch.name):'')+'" placeholder="输入角色名" required></div>'+
    '<div class="fg"><label>简介</label><input id="ed" value="'+(ch?esc(ch.description||''):'')+'" placeholder="简短描述"></div>'+
    '<div class="fg"><label>系统提示词</label><textarea id="ep" rows="4" placeholder="角色的性格、语气、背景...">'+(ch?esc(ch.systemPrompt||''):'')+'</textarea></div>'+
    '<div class="fg"><label>开场白</label><textarea id="eg" rows="2" placeholder="第一句话">'+(ch?esc(ch.greeting||''):'')+'</textarea></div>'+
    '<button type="submit" class="btn-p">保存角色</button>'+
    (id?'<button type="button" class="btn-d" style="margin-top:8px" onclick="del(''+id+'')">删除角色</button>':'')+
  '</form></div>';
  $('ef').addEventListener('submit',async function(e){
    e.preventDefault();
    let sel=$('ap').querySelector('.s');
    let data={name:$('en').value.trim(),avatar:sel?sel.dataset.a:'🤖',description:$('ed').value.trim(),systemPrompt:$('ep').value.trim(),greeting:$('eg').value.trim()};
    if(!data.name){toast('请输入角色名');return}
    try{
      if(id){await api('PUT','/api/characters/'+id,data);toast('已更新')}
      else{let n=await api('POST','/api/characters',data);toast('已创建')}
      home();
    }catch(e){toast('保存失败: '+e.message)}
  });
}

async function del(id){
  if(!confirm('确认删除？不可恢复。'))return;
  try{await api('DELETE','/api/characters/'+id);if(curId===id)curId=null;home();toast('已删除')}catch(e){toast('删除失败')}
}

// ── 设置 ──
function set(){
  R.innerHTML='<div class="hdr"><button class="btn" onclick="home()">‹</button><h1>设置</h1><button class="btn" style="visibility:hidden"> </button></div><div class="main"><div style="padding:14px">'+
    '<div class="fg"><label>DeepSeek API Key *</label><input id="sk" type="password" placeholder="sk-..." value="'+(apiKey?'********':'')+'"></div>'+
    '<div class="fg"><label>API 地址</label><input id="su" value="https://api.deepseek.com"></div>'+
    '<div class="fg"><label>模型</label><input id="sm" value="deepseek-chat"></div>'+
    '<div class="fg"><label>温度 (0-2)</label><input id="st" type="number" value="0.8" min="0" max="2" step="0.1"></div>'+
    '<div class="fg"><label>上下文记忆条数</label><input id="sh" type="number" value="30" min="5" max="100"></div>'+
    '<button class="btn-p" onclick="saveSet()">保存设置</button>'+
    '<button class="btn-d" style="margin-top:16px" onclick="clearAll()">🗑 清除所有数据</button>'+
  '</div></div>';
}
function saveSet(){
  let k=$('sk').value.trim();
  if(k)apiKey=k;
  if(!apiKey&&!k){toast('请输入 API Key');return}
  api('PUT','/api/config',{apiKey:apiKey,baseUrl:$('su').value.trim(),model:$('sm').value.trim(),temperature:parseFloat($('st').value)||.8,maxHistory:parseInt($('sh').value)||30})
  .then(()=>{toast('设置已保存');$('sk').value='********';}).catch(e=>toast('保存失败'));
}
function clearAll(){
  if(!confirm('⚠️ 确认清除所有角色和聊天记录？'))return;
  Promise.all(chars.map(c=>api('DELETE','/api/characters/'+c.id)))
  .then(()=>{apiKey='';curId=null;msgs=[];home();toast('已清除')})
  .catch(e=>toast('清除失败'));
}

// ── 输入框快捷事件 ──
document.addEventListener('keydown',function(e){
  if(e.target===document.activeElement&&e.target.id==='inp'&&e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}
});
document.addEventListener('input',function(e){
  if(e.target.id==='inp'){e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,80)+'px'}
});

// ── 启动 ──
home();
</script>
</body>
</html>
