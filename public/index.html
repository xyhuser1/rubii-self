<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Rubii Self</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:#19191f;color:#e8e0dd;height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased}
#app{height:100%;display:flex;flex-direction:column}
/* ── 顶栏 ── */
.hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#1e1e26;border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0;z-index:2}
.hdr h1{font-size:17px;font-weight:600;flex:1;color:#e8e0dd}
.hdr .btn{background:rgba(255,255,255,.06);border:none;color:#c0b6b2;padding:7px 14px;border-radius:16px;font-size:12px;cursor:pointer;transition:all .15s}
.hdr .btn:active{background:rgba(255,255,255,.12)}
.btn{background:rgba(255,255,255,.06);border:none;color:#c0b6b2;padding:7px 14px;border-radius:16px;font-size:12px;cursor:pointer;transition:all .15s}
.btn:active{background:rgba(255,255,255,.12)}
.btn-p{background:#d4c5c0;color:#2a1f1c;width:100%;padding:13px;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px;transition:all .15s}
.btn-p:active{opacity:.8}
.main{flex:1;overflow-y:auto;padding:16px 16px 120px;scroll-behavior:smooth}
.emp{text-align:center;padding:50px 20px;color:#9a8f8a}
.emp h3{font-size:18px;color:#e8e0dd;margin-bottom:6px}
.emp p{font-size:13px;line-height:1.6}
/* ── 卡牌式角色卡片 ── */
.grid{display:grid;grid-template-columns:1fr;gap:12px;padding-bottom:16px;max-width:380px;margin:0 auto}@media(min-width:450px){.grid{grid-template-columns:1fr 1fr;max-width:400px}}
.card{display:flex;flex-direction:column;background:#f5f2ee;border:none;border-radius:14px;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.2);transition:all .15s;position:relative}
.card:active{transform:scale(.96);opacity:.9}
.card{position:relative}.card .card .fav-btn:active{transform:scale(.85)}.card .fav-btn.off{color:rgba(255,255,255,.5)}.card .av{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:#ebe3df;font-size:42px;flex-shrink:0}
.card .av img{width:100%;height:100%;object-fit:contain;display:block}
.card .nm{font-size:15px;font-weight:600;color:#2a1f1c;margin-bottom:2px}
.card .ds{font-size:12px;color:#8a7a75;line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card .ac{display:flex;gap:4px;margin-top:6px;padding:8px 12px 12px;justify-content:flex-end}
.card .nm,.card .ds{padding:0 12px}
.card .nm{margin-top:8px}
.msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth;position:relative}
.msgs:before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.15);z-index:0;pointer-events:none}
.msg,.msg-row{position:relative;z-index:1}
.msg{max-width:84%;padding:9px 14px;border-radius:16px;font-size:15px;line-height:1.6;word-break:break-word;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.u{align-self:flex-end;background:rgba(245,242,238,.55);color:#2a1f1c;border-bottom-right-radius:4px}
.msg.a{align-self:flex-start;background:rgba(232,223,217,.55);color:#2a1f1c;border-bottom-left-radius:4px}
.msg-row{display:flex;align-items:flex-end;gap:6px;margin-bottom:6px;position:relative}
.u-row{justify-content:flex-end}
.a-row{justify-content:flex-start}
.uav,.aav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;overflow:hidden}
.uav{background:rgba(255,255,255,.06)}
.aav{background:#d4c5c0}
.aav img,.uav img{width:28px;height:28px;object-fit:cover;border-radius:50%}
.rw{font-size:10px;cursor:pointer;opacity:0;transition:opacity .15s;padding:2px 3px;color:#9a8f8a;align-self:center;user-select:none;line-height:1}
.msg-row:hover .rw{opacity:1}
.rw:hover{color:#e8e0dd}
.typing{display:flex;gap:3px;padding:10px 16px;background:#e8dfd9;border-radius:16px;border-bottom-left-radius:4px;align-self:flex-start}
.typing span{width:6px;height:6px;border-radius:50%;background:#b8aba5;animation:ty1 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes ty1{0%,60%,100%{opacity:.3;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}
.inp{display:flex;align-items:flex-end;gap:8px;padding:8px 14px 10px;background:#1e1e26;border-top:1px solid rgba(255,255,255,.04);flex-shrink:0}
.inp textarea{flex:1;resize:none;padding:9px 14px;border-radius:20px;background:rgba(255,255,255,.05);color:#e8e0dd;border:1px solid rgba(255,255,255,.06);max-height:80px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.inp textarea:focus{border-color:rgba(180,167,160,.4)}
.inp textarea::placeholder{color:#9a8f8a}
.inp .sd{width:38px;height:38px;border-radius:50%;background:#d4c5c0;color:#2a1f1c;border:none;font-size:16px;flex-shrink:0;transition:all .15s}
.inp .sd:active{transform:scale(.92)}
.inp .sd:disabled{opacity:.3}
.ar{display:flex;gap:6px;padding:3px 14px 8px;background:#1e1e26;border-top:1px solid rgba(255,255,255,.04);flex-shrink:0;flex-wrap:wrap}
.ar .btn{font-size:11px;padding:5px 12px;border-radius:14px;background:rgba(255,255,255,.05);color:#9a8f8a;border:none}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;color:#9a8f8a;margin-bottom:5px;font-weight:500}
.fg input,.fg textarea{width:100%;padding:10px 13px;border-radius:12px;background:rgba(255,255,255,.05);color:#e8e0dd;border:1px solid rgba(255,255,255,.06);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.fg textarea{min-height:70px;line-height:1.5}
.fg input:focus,.fg textarea:focus{border-color:rgba(180,167,160,.4)}
.fg input::placeholder{color:#7a6e68}
.ap{display:flex;gap:6px;flex-wrap:wrap}
.ap div{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.ap div:active{transform:scale(.9)}
.ap div.s{border-color:#b8a6a0;background:rgba(180,167,160,.15)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:12px;background:#2a2522;color:#e8e0dd;border:1px solid rgba(255,255,255,.06);font-size:13px;z-index:99;max-width:90%;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.3);animation:toastIn .2s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.sn{font-size:11px;color:#9a8f8a;margin-bottom:3px;letter-spacing:.2px}
/* ── 台词颜色高亮 ── */
.dlg-narr{color:#e8e0dd}
.dlg-talk{color:#ffd700;font-weight:700;text-shadow:0 0 10px rgba(255,215,0,0.4),0 0 20px rgba(255,215,0,0.15)}
.dlg-think{color:#9a8f8a;font-style:italic}
/* ── 会话选择器 ── */
.sel-session{background:rgba(255,255,255,.06);color:#c0b6b2;border:none;border-radius:10px;padding:4px 8px;font-size:11px;cursor:pointer;outline:none;max-width:90px;flex-shrink:0}
.sel-session option{background:#1e1e26;color:#e8e0dd}
.dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.dialog-box{background:#1e1e26;border-radius:16px;padding:24px;width:320px;max-width:92%;color:#e8e0dd}
.dialog-box h3{font-size:16px;margin-bottom:10px}
.dialog-box p{font-size:13px;color:#9a8f8a;line-height:1.5;margin-bottom:14px}
.dialog-actions{display:flex;gap:8px;margin-top:14px}
.dialog-actions .btn-cancel{flex:1;padding:10px;background:rgba(255,255,255,.06);border:none;color:#c0b6b2;border-radius:12px;cursor:pointer}
.dialog-actions .btn-confirm{flex:1;padding:10px;background:#d4c5c0;color:#2a1f1c;border:none;border-radius:12px;cursor:pointer;font-weight:600}
</style>
</head>
<body><div id="app"></div>
<script src="js/app.js"></script>

</body>
</html>
