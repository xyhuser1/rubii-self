<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Rubii Self</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:#0f0f12;color:#e8e8f0;height:100dvh;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column}
.hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#1a1a22;border-bottom:1px solid #333;flex-shrink:0}
.hdr h1{font-size:17px;flex:1}.hdr .s{font-size:11px;color:#999}
.btn{background:#2a2a36;border:none;color:#e8e8f0;padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;white-space:nowrap}
.btn:active{background:#3a3a46}
.btn-p{background:#7c6fef;color:#fff;width:100%;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.btn-d{width:100%;padding:12px;border:1px solid rgba(239,68,68,.3);border-radius:10px;color:#ef4444;background:transparent;font-size:15px;cursor:pointer;margin-top:8px}
.main{flex:1;overflow-y:auto;padding:14px}
.emp{text-align:center;padding:40px 20px;color:#999}
.emp .i{font-size:40px;margin-bottom:10px}
.emp h3{font-size:17px;color:#e8e8f0;margin-bottom:6px}
.grid{display:flex;flex-direction:column;gap:10px;padding-bottom:8px}
.card{display:flex;align-items:center;gap:12px;padding:12px;background:#1a1a22;border:1px solid #333;border-radius:12px;cursor:pointer}
.card .av{width:48px;height:48px;border-radius:50%;background:rgba(124,111,239,.12);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.card .nm{font-size:15px;font-weight:600;margin-bottom:2px}
.card .ds{font-size:12px;color:#999}
.card .ac{display:flex;gap:4px}
.card .ac .btn{padding:6px 10px;font-size:12px}
.msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px}
.msg{max-width:88%;padding:8px 12px;border-radius:14px;font-size:15px;line-height:1.5;word-break:break-word}
.msg.u{align-self:flex-end;background:#7c6fef;color:#fff;border-bottom-right-radius:4px}
.msg.a{align-self:flex-start;background:#1a1a22;border:1px solid #333;border-bottom-left-radius:4px}
.msg.a .sn{font-size:11px;color:#999;margin-bottom:3px}
.typing{display:flex;gap:3px;padding:12px 16px;background:#1a1a22;border:1px solid #333;border-radius:14px;align-self:flex-start;border-bottom-left-radius:4px}
.typing span{width:7px;height:7px;border-radius:50%;background:#999;animation:ty1 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes ty1{0%,60%,100%{opacity:.3}30%{opacity:1}}
.inp{display:flex;align-items:flex-end;gap:8px;padding:8px 12px;background:#1a1a22;border-top:1px solid #333;flex-shrink:0}
.inp textarea{flex:1;resize:none;padding:8px 12px;border-radius:18px;background:#2a2a36;color:#e8e8f0;border:1px solid #333;max-height:80px;line-height:1.4;font-size:14px;font-family:inherit}
.inp textarea:focus{border-color:#7c6fef;outline:none}
.inp .sd{width:38px;height:38px;border-radius:50%;background:#7c6fef;color:#fff;border:none;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.inp .sd:disabled{opacity:.4}.msg-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:8px}.u-row{justify-content:flex-end}.a-row{justify-content:flex-start}.uav{width:32px;height:32px;border-radius:50%;background:#2a2a36;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}.aav{width:32px;height:32px;border-radius:50%;background:rgba(124,111,239,.12);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}.aav img{width:32px;height:32px;border-radius:50%;object-fit:cover}
.ar{display:flex;gap:6px;padding:3px 12px 6px;background:#1a1a22;border-top:1px solid #333;flex-shrink:0;flex-wrap:wrap}
.ar .btn{font-size:11px;padding:5px 10px;border-radius:14px;background:#2a2a36;color:#999;border:1px solid #333}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;color:#999;margin-bottom:4px;font-weight:600}
.fg input,.fg textarea,.fg select{width:100%;padding:9px 11px;border-radius:8px;background:#1a1a22;color:#e8e8f0;border:1px solid #333;font-size:14px;font-family:inherit}
.fg textarea{min-height:70px;line-height:1.5}
.fg input:focus,.fg textarea:focus{border-color:#7c6fef;outline:none}
.ap{display:flex;gap:6px;flex-wrap:wrap}
.ap div{width:40px;height:40px;border-radius:50%;background:#1a1a22;border:2px solid #333;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.ap div.s{border-color:#7c6fef;background:rgba(124,111,239,.12)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:10px;background:#1a1a22;color:#e8e8f0;border:1px solid #333;font-size:13px;z-index:99;max-width:90%;text-align:center}
::placeholder{color:#666}
</style>
</head>
<body>
<div id="app"></div>
<script>
var K='',C=[],CID=null,M=[],S=false;
// Load saved config from server
API('GET','/api/config').then(function(cfg){if(cfg.apiKey)K=cfg.apiKey;}).catch(function(){});
var AV='🤖😺🦊🐰🐻🐲🦋🌸👾🎭🧙🧝🦸🧛👻🤠💃🎸🕵️🧚🧜🦄🐉🦅🐺🦁🐯🌙☀️⭐🌺🌻🔥⚡💎🔮⚔️🏹👑🎩🥷🗻🏯⛩️🌊💫'.split('');
function $(i){return document.getElementById(i)}
function T(m){var e=document.querySelector('.toast');if(e)e.remove();e=document.createElement('div');e.className='toast';e.textContent=m;document.body.appendChild(e);setTimeout(function(){e.remove()},3000)}
function E(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function API(m,u,b){var o={method:m,headers:{'Content-Type':'application/json'}};if(b)o.body=JSON.stringify(b);return fetch(u,o).then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(d.error||'Error');return d})})}
var DEF_URL=localStorage.getItem('dsUrl')||'https://api.deepseek.com';var DEF_MODEL=localStorage.getItem('dsModel')||'deepseek-chat';
function getBaseUrl(){var u=$('SU');return u&&u.value?u.value:DEF_URL}
function getModel(){var m=$('SM');return m&&m.value?m.value:DEF_MODEL}

function HOME(){
  document.getElementById('app').innerHTML='<div class="hdr"><h1>Rubii Self</h1><button class="btn" onclick="SET()">&#9881;</button></div><div class="main" id="HM"></div>';LOADHOME();
}
function LOADHOME(){
  API('GET','/api/characters').then(function(list){C=list;var c=$('HM');
    if(list.length===0){c.innerHTML='<div class="emp"><div class="i">&#129302;</div><h3>还没有角色</h3><p>创建角色开始聊天</p></div><div style="padding:16px 0"><button class="btn-p" onclick="EDIT()">+ 创建角色</button></div>';return}
    var h='<div class="grid">';
    for(var i=0;i<list.length;i++){var ch=list[i];h+='<div class="card" onclick="OPENC(\''+ch.id+'\')"><div class="av">'+(ch.avatar&&(ch.avatar.indexOf('http')===0||ch.avatar.indexOf('data:')===0)?'<img src=\"/api/proxy-image?url='+encodeURIComponent(ch.avatar)+'\" style=\"width:48px;height:48px;border-radius:50%;object-fit:cover\">':ch.avatar)+'</div><div><div class="nm">'+E(ch.name)+'</div><div class="ds">'+E(ch.description||'')+'</div></div><div class="ac"><button class="btn" onclick="event.stopPropagation();EDIT(\''+ch.id+'\')">&#9998;</button><button class="btn" onclick="event.stopPropagation();DEL(\''+ch.id+'\')">&#10005;</button></div></div>';}
    h+='</div><div style="padding:8px 0"><button class="btn-p" onclick="EDIT()">+ 创建角色</button></div>';c.innerHTML=h;
  }).catch(function(e){$('HM').innerHTML='<div class="emp"><p>加载失败</p></div>'});
}

function OPENC(id){
  CID=id;var ch=null;for(var i=0;i<C.length;i++){if(C[i].id===id){ch=C[i];break}}
  var g='Hello!';if(ch)g=ch.greeting||'你好，我是'+ch.name;
  document.getElementById('app').innerHTML='<div class="hdr"><button class="btn" onclick="BACK()">&lsaquo;</button><h1>'+(ch?E(ch.name):'Chat')+'</h1><button class="btn" onclick="EDIT(\''+id+'\')">&#9998;</button></div><div class="msgs" id="MS"><div class="emp" id="EM"><div class="i">&#128172;</div><h3>开始聊天</h3><p>'+E(g)+'</p></div></div><div class="ar"><button class="btn" onclick="CLEARC()">&#128465; 清空</button><button class="btn" onclick="EXP()">&#128229; 导出</button></div><div class="inp"><textarea id="INP" rows="1" placeholder="输入消息..." maxlength="5000"></textarea><button class="sd" id="SD" onclick="SEND()">&uarr;</button></div>';
  LOADC();
}
function LOADC(){
  API('GET','/api/characters/'+CID+'/chat').then(function(msgs){M=msgs;RENDER();var inp=$('INP');if(inp)setTimeout(function(){inp.focus()},100)}).catch(function(e){T('加载聊天失败')});
}
function avt(a){if(a&&(a.indexOf('http')===0||a.indexOf('data:')===0))a='/api/proxy-image?url='+encodeURIComponent(a);return a&&(a.indexOf('http')===0||a.indexOf('data:')===0)?'<img src="/api/proxy-image?url='+encodeURIComponent(a)+'" style="width:36px;height:36px;border-radius:50%;object-fit:cover">':(a||'🤖')}
function RENDER(){
  var c=$('MS'),e=$('EM');if(!c)return;
  if(M.length===0){if(e){c.innerHTML='';c.appendChild(e);e.style.display='block'}return}
  if(e)e.style.display='none';
  var ch=null;for(var i=0;i<C.length;i++){if(C[i].id===CID){ch=C[i];break}}
  var n=ch?ch.name:'AI';var a=ch?ch.avatar:'';
  var bg=localStorage.getItem('chatBg')||'';
  var bgStyle=bg?' style="background-image:url('+bg+');background-size:cover;background-position:center"':'';
  var h='';
  for(var i=0;i<M.length;i++){var m=M[i];
    if(m.role==='user'||m.role==='u'){
      h+='<div class="msg-row u-row"><div class="msg u"><div>'+E(m.content)+'</div></div><div class="uav">&#128100;</div></div>';
    }else{
      h+='<div class="msg-row a-row"><div class="aav">'+avt(a)+'</div><div class="msg a"><div class="sn">'+E(n)+'</div><div>'+E(m.content).replace(/\n/g,'<br>')+'</div></div></div>';
    }
  }
  if(bg){c.innerHTML='<div style="min-height:100%;padding:10px 14px"'+bgStyle+'>'+h+'</div>'}else{c.innerHTML=h}
  c.scrollTop=c.scrollHeight;
}function SEND(){
  var inp=$('INP');if(!inp)return;var msg=inp.value.trim();if(!msg||S||!CID)return;
  inp.value='';inp.style.height='auto';S=true;var sd=$('SD');if(sd)sd.disabled=true;
  M.push({role:'user',content:msg,timestamp:Date.now()});RENDER();
  var mc=$('MS');if(mc){var te=document.createElement('div');te.className='typing';te.innerHTML='<span></span><span></span><span></span>';mc.appendChild(te);mc.scrollTop=mc.scrollHeight}
  // 用本地模型时传local-ollama，用API时传真实key
  var theKey=K||'local-ollama';
  API('POST','/api/characters/'+CID+'/chat',{message:msg,config:{apiKey:theKey,baseUrl:getBaseUrl(),model:getModel(),temperature:1.0,maxHistory:100}}).then(function(r){
    var te=document.querySelector('.typing');if(te)te.remove();
    var reply=r.reply||'';reply=reply.replace(/<think>[\s\S]*?<\/think>/g,'').replace(/^[\s\n]*/,'');
    M.push({role:'assistant',content:reply,timestamp:Date.now()});RENDER();
    S=false;if(sd)sd.disabled=false;try{inp.focus()}catch(e){}
  }).catch(function(e){
    var te=document.querySelector('.typing');if(te)te.remove();
    M.push({role:'assistant',content:'&#9888; '+e.message,timestamp:Date.now()});RENDER();
    inp.value=msg;S=false;if(sd)sd.disabled=false;
  });
}
function BACK(){CID=null;M=[];HOME()}
function CLEARC(){if(!CID||!confirm('清空对话？'))return;API('POST','/api/characters/'+CID+'/chat/clear').then(function(){M=[];RENDER();T('已清空')}).catch(function(){T('清空失败')})}
function EXP(){if(CID)window.open('/api/characters/'+CID+'/chat/export','_blank')}

function EDIT(id){
  var ch=null;if(id){for(var i=0;i<C.length;i++){if(C[i].id===id){ch=C[i];break}}}
  var ap='<div class="ap">';var sel=ch?ch.avatar:'🤖';
  for(var i=0;i<AV.length;i++){ap+='<div class="'+(AV[i]===sel?'s':'')+'" onclick=\'var p=this.parentNode;p.querySelectorAll("div").forEach(function(d){d.classList.remove("s")});this.classList.add("s")\'>'+AV[i]+'</div>';}
  ap+='</div>';
  var html='<div class="hdr"><button class="btn" onclick="'+(id&&CID===id?'LOADC();P(\'chat\')':'HOME()')+'">&lsaquo;</button><h1>'+(id?'编辑角色':'创建角色')+'</h1><button class="btn" style="visibility:hidden"> </button></div><div class="main"><form id="EF">'+
    '<div class="fg"><label>头像</label>'+ap+'</div>'+'<div class="fg"><label>头像图片URL（可选）</label><input id="EA" value="'+(ch?E(ch.avatar||''):'')+'" placeholder="https://... 或留空"></div>'+
    '<div class="fg"><label>角色名 *</label><input id="EN" value="'+(ch?E(ch.name):'')+'" placeholder="角色名" required></div>'+
    '<div class="fg"><label>简介</label><input id="ED" value="'+(ch?E(ch.description||''):'')+'" placeholder="简短描述"></div>'+
    '<div class="fg"><label>系统提示词</label><textarea id="EP" rows="4" placeholder="角色性格、语气、背景...">'+(ch?E(ch.systemPrompt||''):'')+'</textarea></div>'+
    '<div class="fg"><label>开场白</label><textarea id="EG" rows="2" placeholder="第一句话">'+(ch?E(ch.greeting||''):'')+'</textarea></div>'+
    '<button type="submit" class="btn-p">保存角色</button>'+(id?'<button type="button" class="btn-d" onclick="DEL(\''+id+'\')">删除角色</button>':'')+'</form></div>';
  document.getElementById('app').innerHTML=html;
  $('EF').addEventListener('submit',function(e){
    e.preventDefault();
    var sel2=document.querySelector('.ap .s');
    var data={name:$('EN').value.trim(),avatar:$(\'EA\').value.trim()||(sel2?sel2.textContent:'🤖'),description:$('ED').value.trim(),systemPrompt:$('EP').value.trim(),greeting:$('EG').value.trim()};
    if(!data.name){T('请输入角色名');return}
    (id?API('PUT','/api/characters/'+id,data):API('POST','/api/characters',data)).then(function(){T(id?'已更新':'已创建');HOME()}).catch(function(e){T('保存失败: '+e.message)});
  });
}
function DEL(id){if(!confirm('确认删除？'))return;API('DELETE','/api/characters/'+id).then(function(){if(CID===id)CID=null;HOME();T('已删除')}).catch(function(){T('删除失败')})}

function SET(){
  document.getElementById('app').innerHTML='<div class="hdr"><button class="btn" onclick="HOME()">&lsaquo;</button><h1>设置</h1><button class="btn" style="visibility:hidden"> </button></div><div class="main"><div style="padding:14px">'+
    '<div class="fg"><label>API Key</label><input id="SK" type="password" placeholder="sk-..."></div>'+
    '<div class="fg"><label>API 地址</label><input id="SU" value="'+getBaseUrl()+'"></div>'+
    '<div class="fg"><label>模型</label><input id="SM" value="'+getModel()+'"></div>'+
    '<div class="fg"><label>温度</label><input id="ST" type="number" value="1.0" step="0.1" min="0" max="2"></div>'+
    '<div class="fg"><label>记忆增强(条数)</label><input id="SH" type="number" value="100" min="10" max="200"></div>'+'<div class="fg"><label>聊天背景图URL</label><input id="SBG" value="'+(localStorage.getItem('chatBg')||'')+'" placeholder="留空=默认"></div>'+
    '<button class="btn-p" onclick="SAVES()">保存</button></div></div>';
}
function SAVES(){
  var k=$('SK').value.trim();if(k){K=k;}
  var u=$('SU').value.trim();if(u){DEF_URL=u;}
  var m=$('SM').value.trim();if(m){DEF_MODEL=m;}
  var bg=$('SBG').value.trim();if(bg!==undefined){localStorage.setItem('chatBg',bg||'')}
  // Save to server so all devices share
  if(K){API('PUT','/api/config',{apiKey:K,baseUrl:DEF_URL,model:DEF_MODEL}).then(function(){T('已保存到服务器，所有设备共享');}).catch(function(){T('保存失败');})}else{T('请输入 API Key');}
}

document.addEventListener('keydown',function(e){if(e.target&&e.target.id==='INP'&&e.key==='Enter'&&!e.shiftKey){e.preventDefault();SEND()}});
document.addEventListener('input',function(e){if(e.target&&e.target.id==='INP'){e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,80)+'px'}});

HOME();
</script>
</body>
</html>
